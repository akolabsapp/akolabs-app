<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1A1A2E">
    <title>AKOLABS - Admin</title>
    <link rel="icon" type="image/png" href="assets/icons/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/admin.css">
</head> 
<body class="admin-body">

    <!-- NAV -->
    <nav class="admin-nav">
        <div class="admin-nav-left">
            <img src="assets/images/logo.png" class="admin-nav-logo" alt="" onerror="this.style.display='none'">
            <span class="admin-nav-title">Admin</span>
            <span class="admin-nav-badge">LIVE</span>
        </div>
        <div class="admin-nav-right">
            <button class="admin-nav-btn outline" onclick="window.open('index.html','_blank')"><i class="fas fa-external-link-alt"></i> App</button>
            <button class="admin-nav-btn outline" onclick="AdminApp.logout()"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </nav>

    <!-- CONTENT -->
    <div class="admin-content" id="admin-content">
        <div style="text-align:center;padding:60px 20px;">
            <div class="spinner"></div>
            <p style="color:#6C6C7E;margin-top:16px;font-size:14px;">Chargement...</p>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>

    <script>
    // ============================================
    // AKOLABS ADMIN
    // ============================================

    var AdminApp = {
        currentTab: 'dashboard',
        stats: null,
        users: [],
        sections: [],
        purchases: [],
        notifications: []
    };

    AdminApp.init = async function() {
        try {
            var session = await db.auth.getSession();
            if (!session.data.session) {
                AdminApp.showLogin();
                return;
            }

            var profile = await db.from('users').select('*').eq('id', session.data.session.user.id).single();
            if (!profile.data || !profile.data.is_admin) {
                AdminApp.showLogin('Acces refuse. Compte admin requis.');
                return;
            }

            AdminApp.profile = profile.data;
            AdminApp.renderDashboard();
        } catch(e) {
            AdminApp.showLogin('Erreur de connexion');
        }
    };

    AdminApp.showLogin = function(msg) {
        var c = document.getElementById('admin-content');
        c.innerHTML = '<div style="max-width:380px;margin:60px auto;padding:32px;background:rgba(255,255,255,0.05);border:1px solid rgba(212,175,55,0.2);border-radius:20px;">'
            + '<h2 style="font-family:Cinzel;color:#D4AF37;text-align:center;margin-bottom:8px;">Admin AKOLABS</h2>'
            + '<p style="color:#8E8E9E;text-align:center;font-size:13px;margin-bottom:24px;">' + (msg || 'Connectez-vous avec un compte admin') + '</p>'
            + '<div class="admin-form-group"><label class="admin-form-label">Email</label><input type="email" class="admin-form-input" id="admin-email"></div>'
            + '<div class="admin-form-group"><label class="admin-form-label">Mot de passe</label><input type="password" class="admin-form-input" id="admin-pwd"></div>'
            + '<button class="admin-btn admin-btn-primary admin-btn-block" onclick="AdminApp.login()"><i class="fas fa-sign-in-alt"></i> Connexion</button>'
            + '</div>';
    };

    AdminApp.login = async function() {
        var email = document.getElementById('admin-email').value.trim();
        var pwd = document.getElementById('admin-pwd').value;
        try {
            var r = await db.auth.signInWithPassword({ email: email, password: pwd });
            if (r.error) throw r.error;
            window.location.reload();
        } catch(e) {
            Utils.showToast('Erreur: ' + (e.message || 'Identifiants invalides'), 'error');
        }
    };

    AdminApp.logout = async function() {
        await db.auth.signOut();
        window.location.reload();
    };

    AdminApp.renderDashboard = async function() {
        var c = document.getElementById('admin-content');

        // Tabs
        var tabs = '<div class="admin-tabs">';
        var tabList = [
            { id: 'dashboard', icon: 'fa-chart-pie', label: 'Dashboard' },
            { id: 'analytics', icon: 'fa-chart-line', label: 'Analytics' },
            { id: 'flash', icon: 'fa-bolt', label: 'Flash' },
            { id: 'popups', icon: 'fa-bullhorn', label: 'Popups' },
            { id: 'users', icon: 'fa-users', label: 'Utilisateurs' },
            { id: 'sections', icon: 'fa-th-large', label: 'Sections' },
            { id: 'purchases', icon: 'fa-receipt', label: 'Achats' },
            { id: 'notifications', icon: 'fa-bell', label: 'Notifs' },
            { id: 'promos', icon: 'fa-tag', label: 'Promos' },
            { id: 'emails', icon: 'fa-envelope', label: 'Emails' },
            { id: 'visuels', icon: 'fa-images', label: 'Visuels' },
            { id: 'testimonials', icon: 'fa-star', label: 'Témoignages' },
            { id: 'paymentmethods', icon: 'fa-credit-card', label: 'Paiements' },
            { id: 'subscriptions', icon: 'fa-users-cog', label: 'Abonnements' },
            { id: 'partner', icon: 'fa-handshake', label: 'Partenaire' },
            { id: 'genv', icon: 'fa-film', label: '🎬 GenV' }
        ];

        for (var i = 0; i < tabList.length; i++) {
            var t = tabList[i];
            var cls = t.id === AdminApp.currentTab ? 'admin-tab active' : 'admin-tab';
            tabs += '<button class="' + cls + '" onclick="AdminApp.switchTab(\'' + t.id + '\')"><i class="fas ' + t.icon + '"></i> ' + t.label + '</button>';
        }
        tabs += '</div>';

        c.innerHTML = tabs + '<div id="admin-tab-content"><div style="text-align:center;padding:40px;"><div class="spinner"></div></div></div>';

        AdminApp.switchTab(AdminApp.currentTab);
    };

    AdminApp.switchTab = async function(tab) {
        AdminApp.currentTab = tab;

        // Update tabs UI
        var allTabs = document.querySelectorAll('.admin-tab');
        for (var i = 0; i < allTabs.length; i++) {
            allTabs[i].classList.remove('active');
            if (allTabs[i].textContent.toLowerCase().indexOf(tab) !== -1 || allTabs[i].onclick.toString().indexOf(tab) !== -1) {
                allTabs[i].classList.add('active');
            }
        }

        var content = document.getElementById('admin-tab-content');
        content.innerHTML = '<div style="text-align:center;padding:40px;"><div class="spinner"></div></div>';

        if (tab === 'dashboard') await AdminApp.renderStats(content);
        else if (tab === 'users') await AdminApp.renderUsers(content);
        else if (tab === 'sections') await AdminApp.renderSections(content);
        else if (tab === 'purchases') await AdminApp.renderPurchases(content);
        else if (tab === 'notifications') await AdminApp.renderNotifications(content);
        else if (tab === 'promos') await AdminApp.renderPromos(content);
        else if (tab === 'emails') await AdminApp.renderEmails(content);
        else if (tab === 'analytics') await AdminApp.renderAnalytics(content);
        else if (tab === 'flash') await AdminApp.renderFlash(content);
        else if (tab === 'popups') await AdminApp.renderPopups(content);
        else if (tab === 'visuels') await AdminApp.renderVisuels(content);
        else if (tab === 'testimonials') await AdminApp.renderTestimonials(content);
        else if (tab === 'paymentmethods') await AdminApp.renderPaymentMethods(content);
        else if (tab === 'subscriptions') await AdminApp.renderSubscriptions(content);
        else if (tab === 'partner') await AdminApp.renderPartner(content);
        else if (tab === 'genv') await AdminApp.renderGenV(content);
    };

    // ===== DASHBOARD =====
    AdminApp.renderStats = async function(container) {
        try {
            var usersR = await db.from('users').select('id, created_at, subscription_plan', { count: 'exact' });
            var purchasesR = await db.from('purchases').select('amount, purchase_type, created_at', { count: 'exact' }).eq('status', 'confirmed');
            var sectionsR = await db.from('sections').select('id', { count: 'exact' }).eq('is_active', true);

            var totalUsers = usersR.count || 0;
            var totalRevenue = 0;
            var todayRevenue = 0;
            var todayUsers = 0;
            var today = new Date().toISOString().split('T')[0];

            // Compteurs par plan
            var planCounts = { starter: 0, pro: 0, premium: 0, lifetime: 0 };
            var planRevenue = { starter: 0, pro: 0, premium: 0, lifetime: 0 };

            // Prix référence par type d'achat (si amount manquant ou 0)
            var planPrices = {
                'starter_access': 1000, 'starter': 1000,
                'pro_access': 1500, 'pro': 1500,
                'premium_access': 3500, 'premium': 3500,
                'app_access': 1500 // ancien type = Pro par défaut
            };

            if (purchasesR.data) {
                for (var i = 0; i < purchasesR.data.length; i++) {
                    var p = purchasesR.data[i];
                    // Utiliser le montant réel, ou déduire du type si 0
                    var amt = p.amount || 0;
                    if (amt === 0 && p.purchase_type) {
                        amt = planPrices[p.purchase_type.toLowerCase()] || 1500;
                    }
                    totalRevenue += amt;
                    if (p.created_at && p.created_at.indexOf(today) === 0) {
                        todayRevenue += amt;
                    }
                    // Classer par plan
                    var pt = (p.purchase_type || '').toLowerCase();
                    if (pt.indexOf('starter') !== -1) { planCounts.starter++; planRevenue.starter += amt; }
                    else if (pt.indexOf('premium') !== -1) { planCounts.premium++; planRevenue.premium += amt; }
                    else if (pt.indexOf('pro') !== -1 || pt === 'app_access') { planCounts.pro++; planRevenue.pro += amt; }
                    else { planCounts.lifetime++; planRevenue.lifetime += amt; }
                }
            }

            if (usersR.data) {
                for (var j = 0; j < usersR.data.length; j++) {
                    if (usersR.data[j].created_at && usersR.data[j].created_at.indexOf(today) === 0) {
                        todayUsers++;
                    }
                }
            }

            var h = '';

            // Stats principales
            h += '<div class="admin-stats">';
            h += '<div class="admin-stat-card"><div class="admin-stat-icon"><i class="fas fa-users"></i></div><div class="admin-stat-value">' + totalUsers + '</div><div class="admin-stat-label">Utilisateurs</div><div class="admin-stat-change up">+' + todayUsers + ' aujourd\'hui</div></div>';
            h += '<div class="admin-stat-card"><div class="admin-stat-icon"><i class="fas fa-coins"></i></div><div class="admin-stat-value">' + Utils.formatPrice(totalRevenue) + '</div><div class="admin-stat-label">Revenus totaux</div><div class="admin-stat-change up">+' + Utils.formatPrice(todayRevenue) + ' aujourd\'hui</div></div>';
            h += '<div class="admin-stat-card"><div class="admin-stat-icon"><i class="fas fa-shopping-cart"></i></div><div class="admin-stat-value">' + (purchasesR.count || 0) + '</div><div class="admin-stat-label">Achats</div></div>';
            h += '<div class="admin-stat-card"><div class="admin-stat-icon"><i class="fas fa-th-large"></i></div><div class="admin-stat-value">' + (sectionsR.count || 0) + '</div><div class="admin-stat-label">Sections actives</div></div>';
            h += '</div>';

            // Répartition par plan
            var totalAchats = purchasesR.count || 0;
            if (totalAchats > 0) {
                h += '<div class="admin-card" style="margin-bottom:16px;">';
                h += '<div class="admin-card-header"><div class="admin-card-title"><i class="fas fa-chart-pie" style="color:#C9A84C;margin-right:8px;"></i>Répartition par plan</div></div>';
                h += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:4px 0 8px;">';

                var planDefs = [
                    { key: 'starter',  label: 'Starter',  price: '1 000 F', color: '#6BB5FF', icon: 'fa-star-half-alt' },
                    { key: 'pro',      label: 'Pro',       price: '1 500 F', color: '#3DDB7D', icon: 'fa-bolt' },
                    { key: 'premium',  label: 'Premium',   price: '3 500 F', color: '#C9A84C', icon: 'fa-gem' }
                ];
                planDefs.forEach(function(pl) {
                    var cnt = planCounts[pl.key] || 0;
                    var rev = planRevenue[pl.key] || 0;
                    var pct = totalAchats > 0 ? Math.round((cnt / totalAchats) * 100) : 0;
                    h += '<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px;text-align:center;">';
                    h += '<i class="fas ' + pl.icon + '" style="color:' + pl.color + ';font-size:16px;margin-bottom:6px;display:block;"></i>';
                    h += '<div style="font-size:11px;color:#9B97B5;margin-bottom:4px;">' + pl.label + ' · ' + pl.price + '</div>';
                    h += '<div style="font-size:18px;font-weight:700;color:' + pl.color + ';">' + cnt + '</div>';
                    h += '<div style="font-size:10px;color:#6C6C7E;">' + pct + '% · ' + Utils.formatPrice(rev) + '</div>';
                    // Barre de progression
                    h += '<div style="background:rgba(255,255,255,0.06);border-radius:4px;height:4px;margin-top:8px;">';
                    h += '<div style="width:' + pct + '%;height:100%;background:' + pl.color + ';border-radius:4px;"></div>';
                    h += '</div>';
                    h += '</div>';
                });
                h += '</div>';
                h += '</div>';
            }

            // Quick actions
            h += '<div class="admin-quick-actions">';
            h += '<div class="admin-quick-action" onclick="AdminApp.switchTab(\'sections\')"><i class="fas fa-plus"></i><span>Ajouter section</span></div>';
            h += '<div class="admin-quick-action" onclick="AdminApp.switchTab(\'notifications\')"><i class="fas fa-paper-plane"></i><span>Envoyer notif</span></div>';
            h += '<div class="admin-quick-action" onclick="AdminApp.switchTab(\'promos\')"><i class="fas fa-tag"></i><span>Creer promo</span></div>';
            h += '<div class="admin-quick-action" onclick="AdminApp.switchTab(\'users\')"><i class="fas fa-user-shield"></i><span>Gerer users</span></div>';
            h += '</div>';

            // Recent purchases
            var recentP = await db.from('purchases').select('*, users(full_name, email)').eq('status', 'confirmed').order('created_at', { ascending: false }).limit(5);

            h += '<div class="admin-card">';
            h += '<div class="admin-card-header"><div class="admin-card-title">Achats recents</div></div>';

            if (recentP.data && recentP.data.length > 0) {
                h += '<div class="admin-table"><table><tr><th>Utilisateur</th><th>Type</th><th>Montant</th><th>Date</th></tr>';
                var _planPrices = {'starter_access':1000,'starter':1000,'pro_access':1500,'pro':1500,'premium_access':3500,'premium':3500,'app_access':1500};
                var _planLabels = {'starter_access':'⭐ Starter','starter':'⭐ Starter','pro_access':'⚡ Pro','pro':'⚡ Pro','premium_access':'💎 Premium','premium':'💎 Premium','app_access':'⚡ Pro'};
                for (var k = 0; k < recentP.data.length; k++) {
                    var p = recentP.data[k];
                    var userName = (p.users && p.users.full_name) ? p.users.full_name : (p.users && p.users.email) ? p.users.email : 'Inconnu';
                    var pt = (p.purchase_type || 'app_access').toLowerCase();
                    var amt = p.amount || _planPrices[pt] || 0;
                    var lbl = _planLabels[pt] || p.purchase_type || '-';
                    h += '<tr><td>' + userName + '</td><td>' + lbl + '</td><td style="color:#D4AF37;font-weight:700;">' + Utils.formatPrice(amt) + '</td><td>' + Utils.timeAgo(p.created_at) + '</td></tr>';
                }
                h += '</table></div>';
            } else {
                h += '<p style="color:#6C6C7E;text-align:center;padding:20px;">Aucun achat</p>';
            }
            h += '</div>';

            // Top affiliés
            try {
                var affiliateR = await db.from('affiliation_leaderboard').select('*').limit(5);
                var topAffiliates = affiliateR.data || [];
                if (topAffiliates.length > 0) {
                    var medals = ['🥇', '🥈', '🥉', '4.', '5.'];
                    h += '<div class="admin-card">';
                    h += '<div class="admin-card-header"><div class="admin-card-title"><i class="fas fa-trophy" style="color:#C9A84C;margin-right:8px;"></i>Top Affiliés</div></div>';
                    topAffiliates.forEach(function(a, idx) {
                        h += '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);">';
                        h += '<span style="font-size:16px;width:24px;">' + medals[idx] + '</span>';
                        h += '<div style="flex:1;font-size:12px;color:#E2E0EC;font-weight:500;">' + (a.full_name || 'Anonyme') + '</div>';
                        h += '<div style="font-size:11px;color:#8A87A0;">' + a.total_referrals + ' filleul(s)</div>';
                        h += '<div style="font-size:12px;font-weight:700;color:#C9A84C;">' + Utils.formatPrice(a.total_earnings) + '</div>';
                        h += '</div>';
                    });
                    h += '</div>';
                }
                container.innerHTML = h;
            } catch(e2) {
                container.innerHTML = h;
            }

        } catch(e) {
            container.innerHTML = '<p style="color:#DC3545;text-align:center;">Erreur: ' + e.message + '</p>';
        }
    };

    // ===== USERS =====
    AdminApp.renderUsers = async function(container) {
        var r = await db.from('users').select('*').order('created_at', { ascending: false }).limit(50);
        var users = r.data || [];

        var h = '<div class="admin-card"><div class="admin-card-header"><div class="admin-card-title">Utilisateurs (' + users.length + ')</div></div>';
        h += '<div class="admin-table"><table><tr><th>Nom</th><th>Email</th><th>App</th><th>Niveau</th><th>Inscrit</th></tr>';

        for (var i = 0; i < users.length; i++) {
            var u = users[i];
            var appStatus = u.is_app_purchased ? '<span class="status active">Oui</span>' : '<span class="status inactive">Non</span>';
            h += '<tr><td>' + (u.full_name || '-') + '</td><td style="font-size:11px;">' + u.email + '</td><td>' + appStatus + '</td><td>' + (u.level || 'Bronze') + '</td><td>' + Utils.timeAgo(u.created_at) + '</td></tr>';
        }

        h += '</table></div></div>';
        container.innerHTML = h;
    };

    // ===== SECTIONS =====
    AdminApp.renderSections = async function(container) {
        var r = await db.from('sections').select('*').order('order_index');
        var sections = r.data || [];

        var h = '<div class="admin-card"><div class="admin-card-header"><div class="admin-card-title">Sections (' + sections.length + ')</div><button class="admin-card-action" onclick="AdminApp.showAddSection()"><i class="fas fa-plus"></i> Ajouter</button></div>';
        h += '<div class="admin-table"><table><tr><th>Titre</th><th>Type</th><th>Prix</th><th>Gratuit</th><th>Actif</th><th>Vues</th><th>Actions</th></tr>';

        for (var i = 0; i < sections.length; i++) {
            var s = sections[i];
            var freeStatus = s.is_free ? '<span class="status active">Oui</span>' : '<span class="status inactive">Non</span>';
            var activeStatus = s.is_active ? '<span class="status active">Oui</span>' : '<span class="status inactive">Non</span>';

            h += '<tr>';
            h += '<td style="font-weight:600;color:#F8F9FA;">' + s.title + '</td>';
            h += '<td>' + s.type + '</td>';
            h += '<td style="color:#D4AF37;">' + Utils.formatPrice(s.price) + '</td>';
            h += '<td>' + freeStatus + '</td>';
            h += '<td>' + activeStatus + '</td>';
            h += '<td>' + (s.total_views || 0) + '</td>';
            h += '<td><button class="admin-btn" style="padding:4px 10px;font-size:10px;background:rgba(212,175,55,0.1);color:#D4AF37;border:1px solid rgba(212,175,55,0.2);" onclick="AdminApp.editSection(\'' + s.id + '\')"><i class="fas fa-edit"></i></button></td>';
            h += '</tr>';
        }

        h += '</table></div></div>';
        container.innerHTML = h;
    };

    AdminApp.showAddSection = function() {
        AdminApp.showSectionForm(null);
    };

    AdminApp.editSection = async function(id) {
        var r = await db.from('sections').select('*').eq('id', id).single();
        if (r.data) AdminApp.showSectionForm(r.data);
    };

    AdminApp.showSectionForm = function(section) {
        var isEdit = !!section;
        var s = section || {};

        var h = '<div class="admin-card">';
        h += '<div class="admin-card-header"><div class="admin-card-title">' + (isEdit ? 'Modifier' : 'Ajouter') + ' une section</div><button class="admin-card-action" onclick="AdminApp.switchTab(\'sections\')"><i class="fas fa-times"></i> Annuler</button></div>';

        h += '<div class="admin-form-group"><label class="admin-form-label">Titre</label><input class="admin-form-input" id="sf-title" value="' + (s.title || '') + '"></div>';
        h += '<div class="admin-form-group"><label class="admin-form-label">Slug</label><input class="admin-form-input" id="sf-slug" value="' + (s.slug || '') + '" placeholder="auto-genere si vide"></div>';
        h += '<div class="admin-form-group"><label class="admin-form-label">Description</label><textarea class="admin-form-textarea" id="sf-desc">' + (s.description || '') + '</textarea></div>';
        h += '<div class="admin-form-group"><label class="admin-form-label">Description longue</label><textarea class="admin-form-textarea" id="sf-longdesc">' + (s.long_description || '') + '</textarea></div>';

        h += '<div class="admin-form-row">';
        h += '<div class="admin-form-group"><label class="admin-form-label">Type</label><select class="admin-form-select" id="sf-type" onchange="AdminApp._toggleSectionTypeFields()"><option value="webview" ' + (s.type === 'webview' ? 'selected' : '') + '>WebView (Universe)</option><option value="drive" ' + (s.type === 'drive' ? 'selected' : '') + '>Drive (Formation)</option><option value="apk" ' + (s.type === 'apk' ? 'selected' : '') + '>APK (App Prime)</option></select></div>';
        h += '<div class="admin-form-group"><label class="admin-form-label">Prix (FCFA)</label><input class="admin-form-input" id="sf-price" type="number" value="' + (s.price || 0) + '"></div>';
        h += '</div>';

        h += '<div class="admin-form-row">';
        h += '<div class="admin-form-group"><label class="admin-form-label">Prix promo</label><input class="admin-form-input" id="sf-promo-price" type="number" value="' + (s.promo_price || '') + '"></div>';
        h += '<div class="admin-form-group"><label class="admin-form-label">Fin promo</label><input class="admin-form-input" id="sf-promo-end" type="datetime-local" value="' + (s.promo_end_date ? s.promo_end_date.slice(0, 16) : '') + '"></div>';
        h += '</div>';

         // Remplacer l'ancienne partie des URLs par ceci :
        h += '<div class="admin-form-group"><label class="admin-form-label">URL du site (webview)</label><input class="admin-form-input" id="sf-siteurl" value="' + (s.site_url || '') + '"></div>';
        h += '<div class="admin-form-group"><label class="admin-form-label">URL Google Drive (formation)</label><input class="admin-form-input" id="sf-driveurl" value="' + (s.drive_url || '') + '"></div>';

        AdminApp.uploadMedia = function(inputId, acceptType) {
        var inputFile = document.createElement('input');
        inputFile.type = 'file';
        inputFile.accept = acceptType;
        
        inputFile.onchange = async function(e) {
            var file = e.target.files[0];
            if (!file) return;

            Utils.showToast('Upload en cours... Patientez.', 'info');
            
            var targetInput = document.getElementById(inputId);
            var originalValue = targetInput.value;
            targetInput.value = 'Telechargement...';
            targetInput.disabled = true;

            try {
                var url = await Utils.uploadToCloudinary(file);
                targetInput.value = url;
                Utils.showToast('Fichier uploadé avec succès !', 'success');
            } catch (err) {
                targetInput.value = originalValue;
                Utils.showToast('Erreur d\'upload', 'error');
            }
            
            targetInput.disabled = false;
        };

        inputFile.click();
    };
    

    AdminApp.saveSection = async function(id) {
        var title = document.getElementById('sf-title').value.trim();
        if (!title) { Utils.showToast('Titre requis', 'warning'); return; }

        var slug = document.getElementById('sf-slug').value.trim() || Utils.slugify(title);
        var advantagesText = document.getElementById('sf-advantages').value.trim();
        var advantages = advantagesText ? advantagesText.split('\n').filter(function(a) { return a.trim(); }) : [];

        var promoEnd = document.getElementById('sf-promo-end').value;

        var downloadUrl = document.getElementById('sf-downloadurl') ? document.getElementById('sf-downloadurl').value.trim() || null : null;

                var data = {
            title: title,
            slug: slug,
            description: document.getElementById('sf-desc').value.trim(),
            long_description: document.getElementById('sf-longdesc').value.trim(),
            type: document.getElementById('sf-type').value,
            price: parseFloat(document.getElementById('sf-price').value) || 0,
            promo_price: parseFloat(document.getElementById('sf-promo-price').value) || null,
            promo_end_date: promoEnd ? new Date(promoEnd).toISOString() : null,
            site_url: document.getElementById('sf-siteurl').value.trim() || null,
            drive_url: document.getElementById('sf-driveurl').value.trim() || null,
            custom_name: document.getElementById('sf-customname').value.trim() || null,
            custom_logo_url: document.getElementById('sf-customlogo').value.trim() || null,
            banner_url: document.getElementById('sf-banner').value.trim() || null,
            preview_video_url: document.getElementById('sf-video') ? document.getElementById('sf-video').value.trim() || null : null,
            duration_estimate: document.getElementById('sf-duration').value.trim() || null,
            order_index: parseInt(document.getElementById('sf-order').value) || 0,
            advantages: advantages,
            is_free: document.getElementById('sf-free').checked,
            is_active: document.getElementById('sf-active').checked,
            is_featured: document.getElementById('sf-featured').checked,
            is_coming_soon: document.getElementById('sf-coming').checked,
            open_in_browser: document.getElementById('sf-open-in-browser') ? document.getElementById('sf-open-in-browser').checked : false
        };

        // Ajouter download_url seulement si la colonne existe (type apk)
        if (downloadUrl !== null) data.download_url = downloadUrl;

        try {
            var result;
            if (id) {
                // Vérifier si la section passait de gratuit à payant
                var wasFreePrev = false;
                var prevR = await db.from('sections').select('is_free').eq('id', id).single();
                if (prevR.data) wasFreePrev = prevR.data.is_free;
                var becomingPaid = wasFreePrev && !data.is_free;

                if (becomingPaid) {
                    // Grandfathering : donner l'accès à vie à tous les utilisateurs existants
                    // qui avaient accès à cette section via is_free
                    Utils.showToast('Grandfathering en cours...', 'info');
                    var usersR = await db.from('users').select('id').eq('is_app_purchased', true);
                    var allUsers = usersR.data || [];

                    if (allUsers.length > 0) {
                        // Récupérer ceux qui ont déjà un accès explicite dans user_sections
                        var existingR = await db.from('user_sections')
                            .select('user_id')
                            .eq('section_id', id);
                        var existingIds = (existingR.data || []).map(function(r) { return r.user_id; });

                        // Ne grafter que ceux qui n'ont pas déjà un accès explicite
                        var toGrant = allUsers.filter(function(u) {
                            return existingIds.indexOf(u.id) === -1;
                        });

                        if (toGrant.length > 0) {
                            var inserts = toGrant.map(function(u) {
                                return {
                                    user_id: u.id,
                                    section_id: id,
                                    access_type: 'lifetime',
                                    granted_by: 'admin',
                                    is_active: true
                                };
                            });
                            await db.from('user_sections').insert(inserts);
                            console.log('[saveSection] Grandfathering : ' + toGrant.length + ' utilisateurs migrés');
                        }
                    }
                }

                result = await db.from('sections').update(data).eq('id', id);
            } else {
                result = await db.from('sections').insert(data);
            }

            console.log('[saveSection] Résultat Supabase:', JSON.stringify(result));

            if (result.error) {
                Utils.showToast('Erreur Supabase: ' + result.error.message, 'error');
                console.error('[saveSection] Erreur:', result.error);
                return;
            }

            Utils.showToast(id ? 'Section modifiée !' : 'Section créée !', 'success');
            AdminApp.switchTab('sections');
        } catch(e) {
            Utils.showToast('Erreur: ' + e.message, 'error');
            console.error('[saveSection] Exception:', e);
        }
    };

    AdminApp.renderPurchases = async function(container) {
        // Prix de référence par plan
        var planPrices = {
            'starter_access': 1000, 'starter': 1000,
            'pro_access': 1500, 'pro': 1500,
            'premium_access': 3500, 'premium': 3500,
            'app_access': 1500
        };
        var planLabels = {
            'starter_access': '⭐ Starter', 'starter': '⭐ Starter',
            'pro_access': '⚡ Pro', 'pro': '⚡ Pro',
            'premium_access': '💎 Premium', 'premium': '💎 Premium',
            'app_access': '⚡ Pro (legacy)'
        };
        var planColors = {
            'starter': '#6BB5FF', 'starter_access': '#6BB5FF',
            'pro': '#3DDB7D', 'pro_access': '#3DDB7D', 'app_access': '#3DDB7D',
            'premium': '#C9A84C', 'premium_access': '#C9A84C'
        };

        var r = await db.from('purchases').select('*, users(full_name, email)').order('created_at', { ascending: false }).limit(50);
        var items = [];

        if (r.error || !r.data) {
            // Fallback sans jointure
            var r2 = await db.from('purchases').select('*').order('created_at', { ascending: false }).limit(50);
            items = r2.data || [];
            if (items.length > 0) {
                var uids = [...new Set(items.map(function(p) { return p.user_id; }).filter(Boolean))];
                var uMap = {};
                var uR = await db.from('users').select('id, full_name, email').in('id', uids);
                (uR.data || []).forEach(function(u) { uMap[u.id] = u; });
                items.forEach(function(p) { if (!p.users && uMap[p.user_id]) p.users = uMap[p.user_id]; });
            }
        } else {
            items = r.data;
        }

        // Calculer totaux
        var totalRevenue = 0;
        items.forEach(function(p) {
            var amt = p.amount || 0;
            if (amt === 0 && p.purchase_type) amt = planPrices[(p.purchase_type||'').toLowerCase()] || 0;
            if (p.status === 'confirmed') totalRevenue += amt;
        });

        var h = '<div class="admin-card">';
        h += '<div class="admin-card-header">';
        h += '<div class="admin-card-title">Achats (' + items.length + ')</div>';
        h += '<div style="font-size:13px;font-weight:700;color:#C9A84C;">Total : ' + Utils.formatPrice(totalRevenue) + '</div>';
        h += '</div>';
        h += '<div class="admin-table"><table><tr><th>Utilisateur</th><th>Plan</th><th>Montant</th><th>Statut</th><th>Paiement</th><th>Date</th></tr>';

        if (items.length === 0) {
            h += '<tr><td colspan="6" style="text-align:center;color:#6C6C7E;padding:20px;">Aucun achat</td></tr>';
        }

        for (var i = 0; i < items.length; i++) {
            var p = items[i];
            var name = (p.users && p.users.full_name) || (p.users && p.users.email) || (p.user_id ? p.user_id.substring(0,8)+'...' : '-');
            var statusCls = p.status === 'confirmed' ? 'active' : p.status === 'pending' ? 'pending' : 'inactive';
            var pt = (p.purchase_type || 'app_access').toLowerCase();
            var planLabel = planLabels[pt] || p.purchase_type || '-';
            var planColor = planColors[pt] || '#C9A84C';
            // Montant : utiliser le réel ou déduire du plan
            var amt = p.amount || 0;
            if (amt === 0) amt = planPrices[pt] || 0;

            h += '<tr>';
            h += '<td style="font-size:11px;">' + name + '</td>';
            h += '<td><span style="background:rgba(255,255,255,0.06);color:' + planColor + ';padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;">' + planLabel + '</span></td>';
            h += '<td style="color:#C9A84C;font-weight:700;">' + Utils.formatPrice(amt) + '</td>';
            h += '<td><span class="status ' + statusCls + '">' + p.status + '</span></td>';
            h += '<td style="font-size:11px;">' + (p.payment_provider || '-') + '</td>';
            h += '<td style="font-size:11px;">' + Utils.timeAgo(p.confirmed_at || p.created_at) + '</td>';
            h += '</tr>';
        }

        h += '</table></div></div>';
        container.innerHTML = h;
    };

    AdminApp.sendPushNotification = async function() {
        var title = document.getElementById('nf-title').value.trim();
        var message = document.getElementById('nf-message').value.trim();
        var url = document.getElementById('nf-url').value.trim() || '/';
        var target = document.getElementById('nf-target').value;
        var resultDiv = document.getElementById('nf-send-result');
        var btn = document.getElementById('nf-send-btn');

        if (!title || !message) { Utils.showToast('Titre et message requis', 'warning'); return; }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Envoi en cours...';
        resultDiv.style.display = 'none';

        try {
            // Appeler via le SDK Supabase (gère auth + CORS automatiquement)
            var response = await db.functions.invoke('send-push', {
                body: { title: title, body: message, url: url, target: target }
            });

            if (response.error) throw new Error(response.error.message || JSON.stringify(response.error));
            var result = response.data;

            if (result && result.success) {
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = '<div style="background:rgba(46,158,91,0.1);border:1px solid rgba(46,158,91,0.3);border-radius:10px;padding:12px;color:#2E9E5B;font-size:13px;">'
                    + '✅ Envoyé à <strong>' + result.sent + '</strong> appareil' + (result.sent > 1 ? 's' : '')
                    + (result.failed > 0 ? ' · ' + result.failed + ' échec(s)' : '')
                    + '</div>';
                Utils.showToast('Notification envoyée !', 'success');
            } else {
                throw new Error(result.error || 'Erreur inconnue');
            }
        } catch(e) {
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '<div style="background:rgba(220,53,69,0.1);border:1px solid rgba(220,53,69,0.3);border-radius:10px;padding:12px;color:#DC3545;font-size:13px;">'
                + '❌ Erreur : ' + e.message + '</div>';
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-paper-plane"></i> Envoyer la notification';
        }
    };

        h += '<div style="font-size:11px;color:#8A87A0;">' + sentOk + ' ok · ' + sentFail + ' échec(s)</div></div>';

        if (logs.length === 0) {
            h += '<p style="color:#8A87A0;text-align:center;padding:20px;font-size:13px;">Aucun email envoyé pour le moment.</p>';

            logs.forEach(function(l) {
                var statusColor = l.status === 'sent' ? '#2E9E5B' : '#D93B3B';
                var statusIcon = l.status === 'sent' ? '✅' : '❌';

                h += '<td style="font-size:11px;color:#6B6880;">' + Utils.timeAgo(l.sent_at) + '</td>';
                h += '</tr>';
            });
            h += '</table></div>';

    AdminApp.renderAnalytics = async function(container) {

    AdminApp._loadAnalytics = async function(container, filter) {
        AdminApp._analyticsFilter = filter;
        try {
            // Calculer plage de dates
            var now = new Date();
            var days = filter === '1d' ? 1 : filter === '7d' ? 7 : filter === '30d' ? 30 : 90;
            var from = new Date(now - days * 86400000).toISOString();

            // Charger les données en parallèle
            var [viewsR, purchasesR, usersR, opensR, topSectR] = await Promise.all([
                db.from('section_views').select('created_at, is_free, section_id').gte('created_at', from),
                db.from('purchases').select('amount, created_at').eq('status', 'confirmed').gte('created_at', from),
                db.from('users').select('created_at').gte('created_at', from),
                db.from('app_opens').select('created_at').gte('created_at', from),
                db.from('section_views').select('section_id, sections(title)').gte('created_at', from)
            ]);

            var views = viewsR.data || [];
            var purchases = purchasesR.data || [];
            var newUsers = usersR.data || [];
            var opens = opensR.data || [];

            // Calculs KPIs
            var totalViews = views.length;
            var totalRevenue = purchases.reduce(function(s, p) { return s + (p.amount || 0); }, 0);
            var totalPurchases = purchases.length;
            var conversion = newUsers.length > 0 ? ((totalPurchases / newUsers.length) * 100).toFixed(1) : 0;
            var freeViews = views.filter(function(v) { return v.is_free; }).length;

            // Construire les données par jour
            var dayMap = {};
            for (var d = 0; d < days; d++) {
                var dd = new Date(now - (days - 1 - d) * 86400000);
                var key = dd.toISOString().split('T')[0];
                dayMap[key] = { views: 0, revenue: 0, users: 0, opens: 0 };
            }

            views.forEach(function(v) { 
                var k = v.created_at.split('T')[0]; 
                if (dayMap[k]) dayMap[k].views++; 
            });
            purchases.forEach(function(p) { 
                var k = p.created_at.split('T')[0]; 
                if (dayMap[k]) dayMap[k].revenue += (p.amount || 0); 
            });
            newUsers.forEach(function(u) { 
                var k = u.created_at.split('T')[0]; 
                if (dayMap[k]) dayMap[k].users++; 
            });
            opens.forEach(function(o) { 
                var k = o.created_at.split('T')[0]; 
                if (dayMap[k]) dayMap[k].opens++; 
            });

            var labels = Object.keys(dayMap).map(function(k) {
                var d = new Date(k);
                return days <= 7 ? ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'][d.getDay()] + ' ' + d.getDate() : d.getDate() + '/' + (d.getMonth()+1);
            });
            var viewsData = Object.values(dayMap).map(function(d) { return d.views; });
            var revenueData = Object.values(dayMap).map(function(d) { return d.revenue; });
            var usersData = Object.values(dayMap).map(function(d) { return d.users; });

            // Top sections
            var sectCount = {};
            (topSectR.data || []).forEach(function(v) {
                var title = v.sections ? v.sections.title : v.section_id;
                sectCount[title] = (sectCount[title] || 0) + 1;
            });
            var topSects = Object.entries(sectCount).sort(function(a,b){return b[1]-a[1];}).slice(0,5);

            // HTML
            var filterBtns = ['1d','7d','30d','90d'].map(function(f) {
                var active = f === filter ? 'background:#4B0082;color:#fff;border-color:#4B0082;' : '';
                return '<button onclick="AdminApp._loadAnalytics(document.getElementById(\'admin-tab-content\'),' + "\'" + f + "\'" + ')" style="padding:6px 14px;border:1px solid #C8C4DC;border-radius:20px;background:transparent;color:#4A4767;font-size:12px;cursor:pointer;' + active + '">' + f + '</button>';
            }).join('');

            var h = '';
            
            // Filtres
            h += '<div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;">' + filterBtns + '</div>';

            // KPI Cards
            h += '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px;">';
            h += AdminApp._kpiCard('👁️', 'Vues', totalViews, freeViews + ' gratuites', '#4B0082');
            h += AdminApp._kpiCard('💰', 'Revenus', Utils.formatPrice(totalRevenue), totalPurchases + ' achats', '#C9A84C');
            h += AdminApp._kpiCard('👥', 'Nouveaux users', newUsers.length, conversion + '% conversion', '#2E9E5B');
            h += AdminApp._kpiCard('📱', 'Ouvertures', opens.length, 'sessions', '#2B7FD4');
            h += '</div>';

            // Graphique Revenus + Vues (style trading)
            h += '<div class="admin-card" style="margin-bottom:16px;">';
            h += '<div class="admin-card-header"><div class="admin-card-title"><i class="fas fa-chart-line" style="color:#C9A84C;margin-right:8px;"></i>Revenus & Vues</div></div>';
            h += '<div style="position:relative;height:220px;"><canvas id="chart-revenue-views"></canvas></div>';
            h += '</div>';

            // Graphique Nouveaux utilisateurs
            h += '<div class="admin-card" style="margin-bottom:16px;">';
            h += '<div class="admin-card-header"><div class="admin-card-title"><i class="fas fa-users" style="color:#2E9E5B;margin-right:8px;"></i>Nouveaux utilisateurs</div></div>';
            h += '<div style="position:relative;height:160px;"><canvas id="chart-users"></canvas></div>';
            h += '</div>';

            // Top sections
            h += '<div class="admin-card">';
            h += '<div class="admin-card-header"><div class="admin-card-title"><i class="fas fa-fire" style="color:#E8A020;margin-right:8px;"></i>Sections les plus vues</div></div>';
            if (topSects.length > 0) {
                var maxVal = topSects[0][1];
                topSects.forEach(function(s, idx) {
                    var pct = Math.round((s[1] / maxVal) * 100);
                    h += '<div style="margin-bottom:12px;">';
                    h += '<div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span style="font-size:12px;color:#1A1A2E;font-weight:500;">' + (idx+1) + '. ' + (s[0] || 'Inconnue') + '</span><span style="font-size:12px;color:#C9A84C;font-weight:700;">' + s[1] + ' vues</span></div>';
                    h += '<div style="height:6px;background:#F0EFF7;border-radius:3px;overflow:hidden;"><div style="height:100%;width:' + pct + '%;background:linear-gradient(90deg,#4B0082,#C9A84C);border-radius:3px;transition:width 0.8s;"></div></div>';
                    h += '</div>';
                });
            } else {
                h += '<p style="color:#8A87A0;text-align:center;padding:20px;font-size:13px;">Aucune vue enregistrée sur la période</p>';
            }
            h += '</div>';

            // ---- BLOC LANDING PAGE TRACKING ----
            h += await AdminApp._buildLandingBlock(from, days, dayMap, filter);

            container.innerHTML = h;

            // Initialiser les graphiques Chart.js
            AdminApp._initChartRevenueViews(labels, revenueData, viewsData);
            AdminApp._initChartUsers(labels, usersData);
            AdminApp._initChartLanding(); // Graphique landing

        } catch(e) {
            container.innerHTML = '<div class="admin-card"><p style="color:#D93B3B;text-align:center;padding:20px;">Erreur: ' + e.message + '</p><p style="color:#8A87A0;text-align:center;font-size:12px;">Vérifiez que les tables section_views et app_opens existent dans Supabase.</p></div>';
        }
    };

    // ===== LANDING PAGE TRACKING =====
    AdminApp._landingChartInstance = null;
    AdminApp._landingChartData = null;

    AdminApp._buildLandingBlock = async function(from, days, appDayMap, filter) {
        try {
            var lR = await db.from('landing_visits')
                .select('visitor_id, source, device, duration_seconds, converted, landed_at')
                .gte('landed_at', from);

            var visits = lR.data || [];

            if (visits.length === 0) {
                return '<div class="admin-card" style="margin-top:16px;">'
                    + '<div class="admin-card-header"><div class="admin-card-title"><i class="fas fa-store" style="color:#C9A84C;margin-right:8px;"></i>Landing Page — Tracking</div></div>'
                    + '<p style="color:#8A87A0;text-align:center;padding:20px;font-size:13px;">Aucune visite enregistrée sur la période. Assurez-vous que la table <strong>landing_visits</strong> existe dans Supabase.</p>'
                    + '</div>';
            }

            // KPIs
            var totalVisits = visits.length;
            var uniqueVisitors = new Set(visits.map(function(v) { return v.visitor_id; })).size;
            var durations = visits.filter(function(v) { return v.duration_seconds > 0; }).map(function(v) { return v.duration_seconds; });
            var avgDuration = durations.length > 0 ? Math.round(durations.reduce(function(a,b){return a+b;},0) / durations.length) : 0;
            var conversions = visits.filter(function(v) { return v.converted; }).length;
            var convRate = totalVisits > 0 ? ((conversions / totalVisits) * 100).toFixed(1) : 0;

            // Sources
            var sourceMap = {};
            visits.forEach(function(v) {
                var s = v.source || 'Direct';
                sourceMap[s] = (sourceMap[s] || 0) + 1;
            });
            var topSources = Object.entries(sourceMap).sort(function(a,b){return b[1]-a[1];});

            // Courbe par jour
            var ldayMap = {};
            Object.keys(appDayMap).forEach(function(k) { ldayMap[k] = { visits: 0, unique: new Set() }; });
            visits.forEach(function(v) {
                var k = v.landed_at.split('T')[0];
                if (ldayMap[k]) {
                    ldayMap[k].visits++;
                    ldayMap[k].unique.add(v.visitor_id);
                }
            });
            var lVisitsData = Object.values(ldayMap).map(function(d) { return d.visits; });
            var lUniqueData = Object.values(ldayMap).map(function(d) { return d.unique.size; });
            var lLabels = Object.keys(ldayMap).map(function(k) {
                var d = new Date(k);
                return days <= 7 ? ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'][d.getDay()] + ' ' + d.getDate() : d.getDate() + '/' + (d.getMonth()+1);
            });

            // Stocker pour le graphique
            AdminApp._landingChartData = { labels: lLabels, visits: lVisitsData, unique: lUniqueData };

            // Format durée
            var fmtDur = avgDuration >= 60
                ? Math.floor(avgDuration/60) + 'min ' + (avgDuration%60) + 's'
                : avgDuration + 's';

            var sourceColors = { 'Facebook': '#1877F2', 'Instagram': '#E1306C', 'TikTok': '#000000', 'WhatsApp': '#25D366', 'Google': '#4285F4', 'Direct': '#4B0082', 'Autre': '#8A87A0' };

            var h = '';
            h += '<div class="admin-card" style="margin-top:16px;">';
            h += '<div class="admin-card-header"><div class="admin-card-title"><i class="fas fa-store" style="color:#C9A84C;margin-right:8px;"></i>Landing Page — Tracking</div></div>';

            // KPI row landing
            h += '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;">';
            h += AdminApp._kpiCard('👁️', 'Visites totales', totalVisits, 'sur la période', '#4B0082');
            h += AdminApp._kpiCard('🧑', 'Visiteurs uniques', uniqueVisitors, 'IDs distincts', '#2B7FD4');
            h += AdminApp._kpiCard('⏱️', 'Temps moyen', fmtDur, 'par visite', '#E8A020');
            h += AdminApp._kpiCard('🎯', 'Taux conversion', convRate + '%', conversions + ' achats', '#2E9E5B');
            h += '</div>';

            // Courbe visites landing
            h += '<div style="position:relative;height:180px;margin-bottom:16px;"><canvas id="chart-landing-visits"></canvas></div>';

            // Sources de trafic
            h += '<div class="admin-card-title" style="font-size:13px;margin-bottom:10px;"><i class="fas fa-share-alt" style="color:#C9A84C;margin-right:6px;"></i>Sources de trafic</div>';
            var maxSrc = topSources.length > 0 ? topSources[0][1] : 1;
            topSources.forEach(function(s) {
                var pct = Math.round((s[1] / maxSrc) * 100);
                var pctReal = ((s[1] / totalVisits) * 100).toFixed(1);
                var color = sourceColors[s[0]] || '#8A87A0';
                h += '<div style="margin-bottom:10px;">';
                h += '<div style="display:flex;justify-content:space-between;margin-bottom:4px;">';
                h += '<span style="font-size:12px;color:#1A1A2E;font-weight:600;">' + s[0] + '</span>';

    AdminApp.createPopup = async function() {
        var title = document.getElementById('pop-title').value.trim();
        var type = document.getElementById('pop-type').value;
        if (!title) { Utils.showToast('Titre requis', 'warning'); return; }

        var startVal = document.getElementById('pop-start').value;
        var endVal = document.getElementById('pop-end').value;

        try {
            await db.from('popups').insert({
                title: title,
                type: type,
                content_url: document.getElementById('pop-content-url').value.trim() || null,
                content_text: document.getElementById('pop-text').value.trim() || null,
                cta_label: document.getElementById('pop-cta-label').value.trim() || 'Voir plus',
                cta_url: document.getElementById('pop-cta-url').value.trim() || null,
                trigger_type: document.getElementById('pop-trigger').value,
                trigger_value: parseInt(document.getElementById('pop-trigger-val').value) || 30,
                display_duration: parseInt(document.getElementById('pop-duration').value) || 5,
                repeat_type: document.getElementById('pop-repeat').value,
                repeat_interval_hours: parseInt(document.getElementById('pop-interval').value) || 24,
                target: document.getElementById('pop-target').value,
                show_on_free_sections: document.getElementById('pop-free').checked,
                show_on_paid_sections: document.getElementById('pop-paid').checked,
                starts_at: startVal ? new Date(startVal).toISOString() : new Date().toISOString(),
                ends_at: endVal ? new Date(endVal).toISOString() : null,
                is_active: true
            });
            Utils.showToast('Popup créé !', 'success');
            AdminApp.switchTab('popups');
        } catch(e) {
            Utils.showToast('Erreur: ' + e.message, 'error');
        }
    };

    AdminApp.togglePopup = async function(id, active) {
        try {
            await db.from('popups').update({ is_active: active }).eq('id', id);
            Utils.showToast(active ? 'Popup activé' : 'Popup mis en pause', 'success');
            AdminApp.switchTab('popups');
        } catch(e) { Utils.showToast('Erreur', 'error'); }
    };

    AdminApp.deletePopup = async function(id) {
        if (!confirm('Supprimer ce popup définitivement ?')) return;
        try {
            await db.from('popup_logs').delete().eq('popup_id', id);
            await db.from('popups').delete().eq('id', id);
            Utils.showToast('Popup supprimé', 'success');
            AdminApp.switchTab('popups');
        } catch(e) { Utils.showToast('Erreur', 'error'); }
    };

        h += '</div></div>';
        h += '</div>';

        h += '<button class="admin-btn admin-btn-primary admin-btn-block" style="background:linear-gradient(135deg,#D93B3B,#B52D2D);border:none;" onclick="AdminApp.createFlash()"><i class="fas fa-bolt"></i> Lancer l&#39;offre flash</button>';
        h += '</div>';

        // Liste des offres flash
        h += '<div class="admin-card">';
        h += '<div class="admin-card-header"><div class="admin-card-title">Offres flash (' + flashes.length + ')</div></div>';

        if (flashes.length === 0) {
            h += '<p style="color:#8A87A0;text-align:center;padding:20px;font-size:13px;">Aucune offre flash créée.</p>';
        } else {
            flashes.forEach(function(f) {
                var isActive = f.is_active && new Date(f.ends_at) > now && new Date(f.starts_at) <= now;
                var isExpired = new Date(f.ends_at) <= now;
                var isPending = new Date(f.starts_at) > now;

                var statusLabel = isExpired ? '⛔ Expirée' : isPending ? '⏳ Planifiée' : isActive ? '🟢 En cours' : '⏸ Pausée';
                var statusColor = isExpired ? '#8A87A0' : isPending ? '#C9A84C' : isActive ? '#2E9E5B' : '#D93B3B';

                var discountInfo = f.discount_percent ? '-' + f.discount_percent + '%' : f.flash_price ? Utils.formatPrice(f.flash_price) : '-';
                var targetInfo = f.sections ? f.sections.title : 'Toutes les sections';
                var ctr = f.total_views > 0 ? Math.round((f.total_purchases / f.total_views) * 100) : 0;

                h += '<div style="background:#FAF9FD;border:1px solid #E2E0EC;border-radius:12px;padding:14px;margin-bottom:10px;">';
                h += '<div style="display:flex;align-items:flex-start;gap:10px;">';
                h += '<div style="width:10px;height:10px;border-radius:50%;background:' + statusColor + ';margin-top:4px;flex-shrink:0;"></div>';

                h += '<div style="font-size:11px;color:#8A87A0;margin-top:2px;">' + targetInfo + ' · ' + discountInfo + '</div>';
                h += '<div style="font-size:11px;color:#4A4767;margin-top:3px;">📅 ' + new Date(f.starts_at).toLocaleString('fr-FR', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) + ' → ' + new Date(f.ends_at).toLocaleString('fr-FR', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) + '</div>';
                h += '<div style="display:flex;gap:10px;margin-top:5px;">';
                h += '<span style="font-size:11px;color:' + statusColor + ';font-weight:600;">' + statusLabel + '</span>';
                h += '<span style="font-size:11px;color:#8A87A0;">👁 ' + (f.total_views||0) + ' · 🛒 ' + (f.total_purchases||0) + ' · ' + ctr + '%</span>';
                h += '</div></div>';

    AdminApp.renderSubscriptions = async function(container) {
        try {
            var { data: subs } = await db.from('users')
                .select('id, full_name, email, subscription_plan, subscription_expires_at, is_app_purchased, created_at')
                .order('created_at', { ascending: false })
                .limit(50);
            subs = subs || [];

            var now = new Date();
            var h = '<div class="admin-card">';
            h += '<div class="admin-card-header"><div class="admin-card-title"><i class="fas fa-users-cog"></i> Gestion des abonnements</div></div>';
            h += '<p style="font-size:13px;color:#4A4767;margin-bottom:16px;">Les utilisateurs avec <strong>subscription_plan = null ou \'lifetime\'</strong> sont les anciens membres avec accès à vie.</p>';

            var stats = { lifetime: 0, starter: 0, pro: 0, premium: 0, expired: 0 };
            subs.forEach(function(u) {
                var plan = u.subscription_plan;
                if (!plan || plan === 'lifetime') stats.lifetime++;
                else if (plan === 'starter') stats.starter++;
                else if (plan === 'pro') { if (!u.subscription_expires_at || new Date(u.subscription_expires_at) > now) stats.pro++; else stats.expired++; }
                else if (plan === 'premium') { if (!u.subscription_expires_at || new Date(u.subscription_expires_at) > now) stats.premium++; else stats.expired++; }
            });

            h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;">';
            [['♾️ À vie', stats.lifetime, '#C9A84C'], ['🟢 Starter', stats.starter, '#3DDB7D'], ['⚡ Pro actif', stats.pro, '#6BB5FF'], ['💎 Premium actif', stats.premium, '#A78BFA'], ['⏰ Expirés', stats.expired, '#FF6B6B']].forEach(function(item) {
                h += '<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:12px;text-align:center;">';
                h += '<div style="font-size:18px;font-weight:700;color:' + item[2] + ';">' + item[1] + '</div>';
                h += '<div style="font-size:11px;color:#9B97B5;">' + item[0] + '</div></div>';
            });
            h += '</div>';

            h += '<div class="admin-table"><table><tr><th>Utilisateur</th><th>Plan</th><th>Expiration</th><th>Statut</th></tr>';
            subs.forEach(function(u) {
                var plan = u.subscription_plan || 'lifetime';
                var exp = u.subscription_expires_at ? new Date(u.subscription_expires_at) : null;
                var isExpired = exp && exp < now;
                var planColor = plan === 'lifetime' ? '#C9A84C' : plan === 'starter' ? '#3DDB7D' : plan === 'pro' ? '#6BB5FF' : plan === 'premium' ? '#A78BFA' : '#888';
                var statusTxt = isExpired ? '<span style="color:#FF6B6B;font-size:11px;">⏰ Expiré</span>' : exp ? '<span style="color:#3DDB7D;font-size:11px;">✅ Actif</span>' : '<span style="color:#C9A84C;font-size:11px;">♾️ À vie</span>';
                var expTxt = exp ? exp.toLocaleDateString('fr-FR') : '—';
                h += '<tr>';
                h += '<td style="font-size:11px;"><div>' + (u.full_name||'—') + '</div><div style="color:#9B97B5;font-size:10px;">' + (u.email||'') + '</div></td>';
                h += '<td><span style="background:rgba(255,255,255,0.06);color:' + planColor + ';padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;">' + plan.toUpperCase() + '</span></td>';
                h += '<td style="font-size:11px;">' + expTxt + '</td>';
                h += '<td>' + statusTxt + '</td>';
                h += '</tr>';
            });
            h += '</table></div></div>';

    };

                    var icons = { 'whatsapp': 'fa-whatsapp', 'facebook': 'fa-facebook', 'tiktok': 'fa-tiktok', 'instagram': 'fa-instagram', 'direct': 'fa-link' };
                    var ico = icons[s.name.toLowerCase()] || 'fa-globe';
                    h += '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);">';
                    h += '<i class="fab ' + ico + '" style="color:#C9A84C;width:14px;font-size:12px;flex-shrink:0;"></i>';
                    h += '<span style="font-size:12px;color:#D4D4E8;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + s.name + '</span>';
                    h += '<div style="width:60px;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin:0 6px;">';
                    h += '<div style="width:' + pct + '%;height:100%;background:#4B0082;border-radius:2px;"></div>';
                    h += '</div>';
                    h += '<span style="font-size:11px;color:#C9A84C;font-weight:700;min-width:30px;text-align:right;">' + pct + '%</span>';
                    h += '</div>';
                });
            }
            h += '</div>';

            // Pays
            h += '<div class="admin-card">';
            h += '<div class="admin-card-header"><div class="admin-card-title"><i class="fas fa-globe" style="color:#C9A84C;margin-right:8px;"></i>Top pays</div></div>';
            if (countries.length === 0) {
                h += '<div style="font-size:12px;color:#6C6C7E;padding:12px 0;">Aucune donnée — envoie le pays via le script de tracking.</div>';
            } else {
                var totalCtry = countries.reduce(function(s,v){ return s + v.count; }, 0);
                countries.forEach(function(c) {
                    var pct = totalCtry > 0 ? Math.round((c.count / totalCtry) * 100) : 0;
                    h += '<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.05);">';
                    h += '<span style="font-size:12px;color:#D4D4E8;flex:1;">' + c.name + '</span>';
                    h += '<div style="width:60px;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin:0 6px;">';
                    h += '<div style="width:' + pct + '%;height:100%;background:#C9A84C;border-radius:2px;"></div>';
                    h += '</div>';
                    h += '<span style="font-size:11px;color:#C9A84C;font-weight:700;min-width:30px;text-align:right;">' + pct + '%</span>';
                    h += '</div>';
                });
            }
            h += '</div>';
            h += '</div>'; // grid

            // ── Moyens de paiement ──
            if (Object.keys(pmMap).length > 0) {
                var totalPM = Object.values(pmMap).reduce(function(a,b){ return a+b; }, 0);
                h += '<div class="admin-card" style="margin-bottom:16px;">';
                h += '<div class="admin-card-header"><div class="admin-card-title"><i class="fas fa-credit-card" style="color:#C9A84C;margin-right:8px;"></i>Moyens de paiement utilisés</div></div>';
                h += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;padding:4px 0;">';
                Object.keys(pmMap).forEach(function(pm) {
                    var pct = Math.round((pmMap[pm] / totalPM) * 100);
                    h += '<div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px;text-align:center;">';
                    h += '<div style="font-size:16px;font-weight:800;color:#C9A84C;">' + pmMap[pm] + '</div>';
                    h += '<div style="font-size:10px;color:#9B97B5;margin:4px 0;">' + pm + '</div>';
                    h += '<div style="font-size:10px;color:#6C6C7E;">' + pct + '%</div>';
                    h += '<div style="background:rgba(255,255,255,0.06);height:3px;border-radius:2px;margin-top:8px;"><div style="width:' + pct + '%;height:100%;background:#C9A84C;border-radius:2px;"></div></div>';
                    h += '</div>';
                });
                h += '</div></div>';
            }

            // ── Transactions ──
            h += '<div class="admin-card">';
            h += '<div class="admin-card-header"><div class="admin-card-title"><i class="fas fa-receipt" style="color:#C9A84C;margin-right:8px;"></i>Dernières ventes GenV (' + totalSales + ')</div>';
            if (revenue > 0) h += '<div style="font-size:13px;font-weight:700;color:#C9A84C;">Total : ' + Utils.formatPrice(revenue) + '</div>';
            h += '</div>';

            if (txns.length === 0) {
                h += '<div style="text-align:center;color:#6C6C7E;padding:24px;font-size:13px;">Aucun achat enregistré sur cette période.</div>';
            } else {
                h += '<div class="admin-table"><table>';
                h += '<tr><th>Référence</th><th>Client</th><th>Téléphone</th><th>Montant</th><th>Moyen</th><th>Pays</th><th>Date</th></tr>';
                txns.forEach(function(t) {
                    h += '<tr>';
                    h += '<td style="font-size:10px;font-family:monospace;color:#8A87A0;">' + (t.reference || '—') + '</td>';
                    h += '<td style="font-size:11px;">' + (t.customer_name || t.email || '—') + '</td>';
                    h += '<td style="font-size:11px;color:#8A87A0;">' + (t.phone || '—') + '</td>';
                    h += '<td style="color:#C9A84C;font-weight:700;">' + Utils.formatPrice(t.amount || 5000) + '</td>';
                    h += '<td style="font-size:11px;">' + (t.payment_method || '—') + '</td>';
                    h += '<td style="font-size:11px;color:#8A87A0;">' + (t.country || '—') + '</td>';
                    h += '<td style="font-size:11px;color:#8A87A0;">' + Utils.timeAgo(t.created_at) + '</td>';
                    h += '</tr>';
                });
                h += '</table></div>';
            }
            h += '</div>';

            // ── SQL Schema reminder ──
            h += '<div style="background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.15);border-radius:12px;padding:14px 16px;margin-top:4px;">';
            h += '<div style="font-size:11px;font-weight:700;color:#C9A84C;margin-bottom:8px;"><i class="fas fa-database" style="margin-right:6px;"></i>Table Supabase requise : <code>genv_page_stats</code></div>';
            h += '<pre style="font-size:10px;color:#8A87A0;overflow-x:auto;line-height:1.6;">CREATE TABLE genv_page_stats (\n  id uuid DEFAULT gen_random_uuid() PRIMARY KEY,\n  event_type text NOT NULL, -- pageview | cta_click | pay_start | purchase\n  visitor_id text,          -- fingerprint local (localStorage)\n  session_id text,\n  source text,              -- whatsapp | facebook | tiktok | direct | ...\n  country text,             -- détecté via IP ou headers\n  reference text,           -- ref Genius Pay (pour purchase)\n  customer_name text,\n  email text,\n  phone text,\n  amount integer DEFAULT 5000,\n  payment_method text,      -- MTN MoMo | Wave | ...\n  metadata jsonb,\n  created_at timestamptz DEFAULT now()\n);\n-- Index pour performance\nCREATE INDEX idx_genv_event ON genv_page_stats(event_type);\nCREATE INDEX idx_genv_created ON genv_page_stats(created_at);\n-- RLS : autoriser INSERT public, SELECT admin seulement\nALTER TABLE genv_page_stats ENABLE ROW LEVEL SECURITY;\nCREATE POLICY "insert_public" ON genv_page_stats FOR INSERT TO anon WITH CHECK (true);\nCREATE POLICY "select_admin" ON genv_page_stats FOR SELECT TO authenticated USING (true);</pre>';
            h += '</div>';

            container.innerHTML = h;

        } catch(err) {
            container.innerHTML = '<div style="padding:24px;color:#EF4444;font-size:13px;"><i class="fas fa-exclamation-triangle" style="margin-right:8px;"></i>Erreur lors du chargement des stats GenV : ' + (err.message || err) + '<br><br><span style="color:#8A87A0;font-size:12px;">Vérifies que la table <code>genv_page_stats</code> existe dans Supabase.</span></div>';
        }
    };

    </script>

</body>
</html>

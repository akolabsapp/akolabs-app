<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#4B0082">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AKOLABS Tedora">
    <meta name="description" content="AKOLABS Tedora - Votre arsenal digital premium. Accédez à des outils et formations exclusifs.">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="msapplication-TileColor" content="#4B0082">

    <title>AKOLABS Tedora</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/app.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>

    <!-- ========== SPLASH SCREEN ========== -->
    <div id="splash-screen" class="splash-screen">
        <div class="splash-content">
            <img src="assets/images/logo.png" alt="AKOLABS Tedora" class="splash-logo"
                 onerror="this.outerHTML='<div style=\'font-family:Cinzel;font-size:36px;color:#D4AF37;font-weight:700;\'>AKOLABS Tedora</div>'">
            <div class="splash-loader"></div>
            <p class="splash-text">Chargement en cours</p>
        </div>
    </div>

    <!-- ========== APP CONTAINER ========== -->
    <div id="app" class="app-container" style="display:none;">

        <!-- ---- HEADER ---- -->
        <header id="app-header" class="app-header">
            <div class="header-left">
                <img src="assets/images/logo.png" alt="AKOLABS Tedora" class="header-logo"
                     onerror="this.style.display='none'">
                <span class="header-brand-name">AKOLABS Tedora</span>
            </div>
            <div class="header-right">
                <button class="header-btn" id="btn-notifications" onclick="Router.navigate('/notifications')">
                    <i class="fas fa-bell"></i>
                    <span class="notification-badge" id="notif-badge" style="display:none;">0</span>
                </button>
                <div class="header-avatar" id="btn-profile" onclick="Router.navigate('/profile')">
                    <img id="user-avatar" alt="Avatar"
                         onerror="this.src=CONFIG.DEFAULT_AVATAR">
                </div>
            </div>
        </header>

        <!-- ---- CONTENU PRINCIPAL ---- -->
        <main id="main-content" class="main-content">
            <!-- Le router injecte les pages ici -->
        </main>

        <!-- ---- BARRE DE NAVIGATION BOTTOM ---- -->
        <nav id="bottom-nav" class="bottom-nav">
            <button class="nav-item active" data-page="home" onclick="Router.navigate('/home')">
                <i class="fas fa-home"></i>
                <span>Accueil</span>
            </button>
            <button class="nav-item" data-page="affiliation" onclick="Router.navigate('/affiliation')">
                <i class="fas fa-users"></i>
                <span>Affiliation</span>
            </button>
            <button class="nav-item" data-page="files" onclick="Router.navigate('/files')">
                <i class="fas fa-folder"></i>
                <span>Fichiers</span>
            </button>
            <button class="nav-item" data-page="profile" onclick="Router.navigate('/profile')">
                <i class="fas fa-user"></i>
                <span>Profil</span>
            </button>
        </nav>

    </div>

    <!-- ========== SCRIPTS ========== -->
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- App Scripts (ordre important) -->
    
    <!-- FeexPay SDK -->
    <script src="js/partner-config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/router.js"></script>
    <script src="js/onboarding.js"></script>
    <script src="js/pages/home.js"></script>
    <script src="js/pages/section-detail.js"></script>
    <script src="js/partner_section_patch.js"></script>
    <script src="js/pages/section-webview.js"></script>
    <script src="js/pages/formation-detail.js"></script>
    <script src="js/pages/affiliation.js"></script>
    <script src="js/pages/files.js"></script>
    <script src="js/pages/notifications.js"></script>
    <script src="js/pages/profile.js"></script>
    <script src="js/partner_profile_patch.js"></script>
    <script src="js/email-marketing.js"></script>
    <script src="js/push.js"></script>
    <script src="js/flash-sale.js"></script>
    <script src="js/tracking.js"></script>
    <script src="js/app.js"></script>
    
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => {
                        console.log('[SW] Enregistré:', reg.scope);
                    })
                    .catch(err => {
                        console.warn('[SW] Erreur d\'enregistrement:', err);
                    });
            });
        }
    </script>

    <script>
    // Protection contre téléchargement d'images (clic droit PC + appui long mobile)
    document.addEventListener('contextmenu', function(e) {
        if (e.target.tagName === 'IMG') {
            e.preventDefault();
            return false;
        }
    });
    document.addEventListener('dragstart', function(e) {
        if (e.target.tagName === 'IMG') {
            e.preventDefault();
            return false;
        }
    });
    </script>
</body>
</html>
